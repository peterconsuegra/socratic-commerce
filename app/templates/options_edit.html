{% extends "layout.html" %}

{% block title %}
    Monthly Data
{% endblock %}

{% block content %}
    <div class="container mt-4">
        <h1 class="text-center">Edit Option</h1>
        <form action="/options/{{ option['id'] }}/edit" method="POST" class="mt-3">
            <div class="mb-3">
                <label for="meta_key" class="form-label">Meta Key</label>
                <input type="text" class="form-control" id="meta_key" name="meta_key" value="{{ option['meta_key'] }}" readonly>
            </div>
            <div class="mb-3">
                <label for="meta_value" class="form-label">Meta Value</label>
                <input type="text" class="form-control" id="meta_value" name="meta_value" value="{{ option['meta_value'] }}">
            </div>
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="/options" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
