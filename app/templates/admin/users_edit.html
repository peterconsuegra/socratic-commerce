{% extends "layout.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 720px;">
  <h2 class="mb-3">Edit user</h2>

  <form method="POST" action="{{ url_for('main.admin_users_edit', user_id=user.id) }}">
    <div class="mb-3">
      <label class="form-label">Username (email)</label>
      <input class="form-control" type="text" name="username" value="{{ user.username }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select class="form-select" name="role">
        <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">New password (leave blank to keep current)</label>
      <input class="form-control" type="password" name="password" placeholder="Leave blank to keep current password">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-light" href="{{ url_for('main.admin_users_index') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
